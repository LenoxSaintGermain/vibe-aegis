<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1612"/>

  <!-- Gradient overlay -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#c69c6d;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1a1612;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#c69c6d" flood-opacity="0.5"/>
    </filter>
  </defs>

  <circle cx="600" cy="315" r="300" fill="url(#glow)"/>

  <!-- Card decorations -->
  <g opacity="0.3">
    <rect x="200" y="180" width="180" height="280" rx="12" fill="none" stroke="#c69c6d" stroke-width="2"/>
    <rect x="510" y="180" width="180" height="280" rx="12" fill="none" stroke="#10b981" stroke-width="2"/>
    <rect x="820" y="180" width="180" height="280" rx="12" fill="none" stroke="#c69c6d" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="600" y="120" font-family="Georgia, serif" font-size="72" font-weight="600" fill="#c69c6d" text-anchor="middle" filter="url(#shadow)">
    Vibe A.E.G.I.S.
  </text>

  <!-- Subtitle -->
  <text x="600" y="520" font-family="Georgia, serif" font-size="32" fill="#f5f1e8" text-anchor="middle" opacity="0.9">
    Read Your Repo's Coding Vibe
  </text>

  <!-- Tagline -->
  <text x="600" y="565" font-family="monospace" font-size="20" fill="#10b981" text-anchor="middle" opacity="0.8">
    AI-Powered GitHub Personality Analysis
  </text>

  <!-- Mystical symbols -->
  <g opacity="0.4" fill="none" stroke="#c69c6d" stroke-width="2">
    <!-- Stars -->
    <path d="M 290,240 L 295,255 L 310,255 L 298,265 L 303,280 L 290,270 L 277,280 L 282,265 L 270,255 L 285,255 Z"/>
    <path d="M 600,240 L 605,255 L 620,255 L 608,265 L 613,280 L 600,270 L 587,280 L 592,265 L 580,255 L 595,255 Z"/>
    <path d="M 910,240 L 915,255 L 930,255 L 918,265 L 923,280 L 910,270 L 897,280 L 902,265 L 890,255 L 905,255 Z"/>
  </g>

  <!-- Bottom accent -->
  <line x1="300" y1="590" x2="900" y2="590" stroke="#c69c6d" stroke-width="2" opacity="0.5"/>
</svg>
